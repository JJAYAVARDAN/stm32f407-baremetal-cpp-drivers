<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="CLASS" height="405px" preserveAspectRatio="none" style="width:585px;height:405px;background:#FEFEFE;" version="1.1" viewBox="0 0 585 405" width="585px" zoomAndPan="magnify"><?plantuml 1.2026.5?><defs/><g><rect fill="#FEFEFE" height="405" style="stroke:none;stroke-width:1;" width="585" x="0" y="0"/><g class="title" data-source-line="1"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="332.6162" x="122.9146" y="24.5332">NVIC Driver &#8212; Static Interrupt Controller Interface</text></g><!--class NVIC--><g class="entity" data-qualified-name="NVIC" data-source-line="11" id="ent0001"><rect fill="#F5FAFF" height="111.5313" rx="2.5" ry="2.5" style="stroke:#2C7FB8;stroke-width:0.5;" width="315.8301" x="7" y="239.6094"/><ellipse cx="141.9873" cy="260.9609" fill="#ADD1B2" rx="11" ry="11" style="stroke:#181818;stroke-width:1;"/><path d="M144.7529,256.8359 Q144.9092,256.6172 145.0967,256.5078 Q145.2842,256.3984 145.5029,256.3984 Q145.8779,256.3984 146.1123,256.6641 Q146.3467,256.9141 146.3467,257.5234 L146.3467,258.9766 Q146.3467,259.5859 146.1123,259.8516 Q145.8779,260.1172 145.5029,260.1172 Q145.1592,260.1172 144.9561,259.9141 Q144.7529,259.7266 144.6436,259.2109 Q144.5967,258.8516 144.4092,258.6641 Q144.0811,258.2891 143.4717,258.0703 Q142.8623,257.8516 142.2373,257.8516 Q141.4717,257.8516 140.8311,258.1797 Q140.2061,258.5078 139.7061,259.2578 Q139.2217,260.0078 139.2217,261.0391 L139.2217,262.1328 Q139.2217,263.3672 140.1123,264.1953 Q141.0029,265.0078 142.5967,265.0078 Q143.5342,265.0078 144.1904,264.7578 Q144.5811,264.6016 145.0029,264.1641 Q145.2686,263.8984 145.4092,263.8203 Q145.5654,263.7422 145.7686,263.7422 Q146.0967,263.7422 146.3467,264.0078 Q146.6123,264.2578 146.6123,264.6016 Q146.6123,264.9453 146.2686,265.3516 Q145.7686,265.9297 144.9717,266.2578 Q143.8936,266.7109 142.5967,266.7109 Q141.0811,266.7109 139.8779,266.0859 Q138.8936,265.5859 138.2061,264.5234 Q137.5186,263.4453 137.5186,262.1641 L137.5186,261.0078 Q137.5186,259.6797 138.1279,258.5391 Q138.7529,257.3828 139.8467,256.7734 Q140.9404,256.1484 142.1748,256.1484 Q142.9092,256.1484 143.5498,256.3203 Q144.2061,256.4766 144.7529,256.8359 Z " fill="#000000"/><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="41.3555" x="160.4873" y="257.0664">&#171;static&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="33.4482" x="164.4409" y="274.2363">NVIC</text><line style="stroke:#2C7FB8;stroke-width:0.5;" x1="8" x2="321.8301" y1="282.3125" y2="282.3125"/><line style="stroke:#2C7FB8;stroke-width:0.5;" x1="8" x2="321.8301" y1="290.3125" y2="290.3125"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" text-decoration="underline" textLength="212.8164" x="13" y="308.8457">+enableIRQ(IRQn_Type irq) : void</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" text-decoration="underline" textLength="215.1406" x="13" y="326.4551">+disableIRQ(IRQn_Type irq) : void</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" text-decoration="underline" textLength="303.8301" x="13" y="344.0645">+setPriority(IRQn_Type irq, uint8_t priority) : void</text></g><g class="entity" data-qualified-name="GMN2" data-source-line="18" id="ent0003"><path d="M358,200.6094 L358,291.6094 L323.26,295.6094 L358,299.6094 L358,390.4766 A0,0 0 0 0 358,390.4766 L570.4453,390.4766 A0,0 0 0 0 570.4453,390.4766 L570.4453,210.6094 L560.4453,200.6094 L358,200.6094 A0,0 0 0 0 358,200.6094" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M560.4453,200.6094 L560.4453,210.6094 L570.4453,210.6094 L560.4453,200.6094" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="175.5571" x="364" y="219.1045">All methods are static &#8212; NVIC</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="158.9834" x="364" y="235.4561">is a hardware singleton, not</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="112.0234" x="364" y="251.8076">an owned instance.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="3.6118" x="364" y="268.1592">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="176.3062" x="364" y="284.5107">enableIRQ() sets the matching</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="117.7681" x="364" y="300.8623">bit in NVIC_ISER[n].</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="191.4453" x="364" y="317.2139">disableIRQ() sets NVIC_ICER[n].</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="185.6436" x="364" y="333.5654">setPriority() writes NVIC_IPR[n];</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="173.418" x="364" y="349.917">hardware only implements the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="158.9707" x="364" y="366.2686">top 4 bits of the priority field</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="177.7153" x="364" y="382.6201">(STM32F4 uses 4 priority bits).</text></g><!--class Peripheral--><g class="entity" data-qualified-name="Peripheral" data-source-line="31" id="ent0005"><rect fill="#F5FAFF" height="61.2188" rx="2.5" ry="2.5" style="stroke:#2C7FB8;stroke-width:0.5;" width="147.1172" x="91.5" y="45.6094"/><ellipse cx="
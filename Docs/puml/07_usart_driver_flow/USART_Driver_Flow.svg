.927" y="256.4414">Configure GPIO pins as</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="144.0527" x="191.927" y="271.5352">Alternate Function (TX/RX)</text><rect fill="#F5FAFF" height="50.1875" rx="12.5" ry="12.5" style="stroke:#2C7FB8;stroke-width:0.5;" width="144.0488" x="191.929" y="304.1719"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="94.0254" x="201.929" y="326.6289">Set USART_BRR</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="124.0488" x="201.929" y="341.7227">(baud rate, from PCLK)</text><rect fill="#F5FAFF" height="50.1875" rx="12.5" ry="12.5" style="stroke:#2C7FB8;stroke-width:0.5;" width="191.4102" x="168.2483" y="374.3594"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="92.6953" x="178.2483" y="396.8164">Set USART_CR1</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="171.4102" x="178.2483" y="411.9102">(word length, enable TX/RX/UE)</text><rect fill="#F5FAFF" height="50.1875" rx="12.5" ry="12.5" style="stroke:#2C7FB8;stroke-width:0.5;" width="112.6953" x="207.6057" y="444.5469"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="92.6953" x="217.6057" y="467.0039">Set USART_CR2</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="52.6816" x="217.6057" y="482.0977">(stop bits)</text><rect fill="#F5FAFF" height="50.1875" rx="12.5" ry="12.5" style="stroke:#2C7FB8;stroke-width:0.5;" width="130.707" x="198.5999" y="514.7344"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="92.6953" x="208.5999" y="537.1914">Set USART_CR3</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="110.707" x="208.5999" y="552.2852">(flow 
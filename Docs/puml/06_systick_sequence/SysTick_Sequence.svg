2" x="587.6011" y="618.377">SysTick_Handler (ISR)</text></g><g class="message" data-entity-1="part1" data-entity-2="part2" data-source-line="16" id="msg1"><polygon fill="#2C7FB8" points="188.6436,149.5703,198.6436,153.5703,188.6436,157.5703,192.6436,153.5703" style="stroke:#2C7FB8;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#2C7FB8;stroke-width:1;" x1="42.2446" x2="194.6436" y1="153.5703" y2="153.5703"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="115.2417" x="49.2446" y="148.7139">init(tickFreq = 1000)</text></g><g class="message" data-entity-1="part2" data-entity-2="part3" data-source-line="17" id="msg2"><polygon fill="#2C7FB8" points="468.7461,179.9219,478.7461,183.9219,468.7461,187.9219,472.7461,183.9219" style="stroke:#2C7FB8;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#2C7FB8;stroke-width:1;" x1="200.6436" x2="474.7461" y1="183.9219" y2="183.9219"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="238.748" x="207.6436" y="179.0654">LOAD = (SystemCoreClock / tickFreq) - 1</text></g><g class="message" data-entity-1="part2" data-entity-2="part3" data-source-line="18" id="msg3"><polygon fill="#2C7FB8" points="468.7461,210.2734,478.7461,214.2734,468.7461,218.2734,472.7461,214.2734" style="stroke:#2C7FB8;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#2C7FB8;stroke-width:1;" x1="200.6436" x2="474.7461" y1="214.2734" y2="214.2734"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="256.1025" x="207.6436" y="209.417">CTRL |= ENABLE | TICKINT | CLKSOURCE</text></g><path d="M205,227.2734 L205,286.2734 L413,286.2734 L413,237.2734 L403,227.2734 L205,227.2734" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M403,227.2734 L403,237.2734 L413,237.2734 L403,227.2734" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="176.998" x="211" y="245.7686">mTickFreq stored for later use.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="187.0908" x="211" y="262.1201">delayMs() assumes 1ms ticks &#8212;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="182.0825" x="211" y="278.4717">only correct if tickFreq == 1000.</text><g class="message" data-entity-1="part1" data-entity-2="part2" data-source-line="25" id="msg4"><polygon fill="#2C7FB8" points="188.6436,309.6797,198.6436,313.6797,188.6436,317.6797,192.6436,313.6797" style="stroke:#2C7FB8;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#2C7FB8;stroke-width:1;" x1="42.2446" x2="194.6436" y1="313.6797" y2="313.6797"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="78.7554" x="49.2446" y="308.8232">delayMs(100)</text></g><g class="message" data-entity-1="part2" data-entity-2="part2" data-source-line="26" id="msg5"><line style="stroke:#2C7FB8;stroke-width:1;" x1="200.6436" x2="242.6436" y1="344.0313" y2="344.0313"/><line style="stroke:#2C7FB8;stroke-width:1;" x1="242.6436" x2="242.6436" y1="344.0313" y2="357.0313"/><line style="stroke:#2C7FB8;stroke-width:1;" x1="201.6436" x2="242.6436" y1="357.0313" y2="357.0313"/><polygon fill="#2C7FB8" points="211.6436,353.0313,201.6436,357.0313,211.6436,361.0313,207.6436,357.0313" style="stroke:#2C7FB8;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="124.2681" x="207.6436" y="339.1748">record start tick count</text></g><path d="M159.1436,372.0313 L231.5781,372.0313 L231.5781,380.3828 L221.5781,390.3828 L159.1436,390.3828 L159.1436,372.0313" fill="#EEEEEE" style="stroke:#000000;stroke-width:1.5;"/><rect fill="none"